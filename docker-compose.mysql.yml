services:
  mysql:
    image: mysql:8.4
    container_name: devweb-ing1-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: maison_intelligente
      MYSQL_USER: maison
      MYSQL_PASSWORD: maison123
    volumes:
      - mysql_devweb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  mysql_devweb_data:
