spring.application.name=maison-intelligente
server.port=8080
server.error.include-message=always

# --- Dev database: H2 file mode (persists across restarts) ---
# Keep URL compatible with containerized environments (Render) by avoiding AUTO_SERVER.
# Override via APP_DATASOURCE_URL for other strategies (e.g. jdbc:h2:mem:maison).
spring.datasource.url=${APP_DATASOURCE_URL:jdbc:h2:file:./data/maison-db;MODE=MySQL;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=${APP_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${APP_DATASOURCE_USERNAME:sa}
spring.datasource.password=${APP_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=${APP_JPA_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Email verification at signup (mandatory by default)
app.auth.email-verification-enabled=${APP_AUTH_EMAIL_VERIFICATION_ENABLED:true}
app.auth.email-verification-debug-token-enabled=${APP_AUTH_EMAIL_VERIFICATION_DEBUG_TOKEN_ENABLED:false}

# SMTP config (required to send real verification codes)
spring.mail.host=${APP_MAIL_HOST:}
spring.mail.port=${APP_MAIL_PORT:587}
spring.mail.username=${APP_MAIL_USERNAME:}
spring.mail.password=${APP_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${APP_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${APP_MAIL_SMTP_STARTTLS:true}
app.mail.from=${APP_MAIL_FROM:no-reply@maison-connectee.local}
app.mail.app-name=${APP_MAIL_APP_NAME:Maison Intelligente}

# --- Scheduler toggle (set false in CI to silence cron-fired scenarios) ---
app.scheduler.enabled=${APP_SCHEDULER_ENABLED:true}

