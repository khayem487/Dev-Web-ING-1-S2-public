spring.application.name=maison-intelligente
server.port=8080

# --- Dev database: H2 file mode (persists across restarts) ---
# AUTO_SERVER=TRUE allows multiple processes (h2-console + app) to share the file
# DB_CLOSE_ON_EXIT=FALSE prevents Hibernate from dropping the file at shutdown
# Override via env var SPRING_DATASOURCE_URL=jdbc:h2:mem:maison;... for ephemeral test runs
spring.datasource.url=${APP_DATASOURCE_URL:jdbc:h2:file:./data/maison-db;MODE=MySQL;AUTO_SERVER=TRUE;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=${APP_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${APP_DATASOURCE_USERNAME:sa}
spring.datasource.password=${APP_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=${APP_JPA_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Scheduler toggle (set false in CI to silence cron-fired scenarios) ---
app.scheduler.enabled=${APP_SCHEDULER_ENABLED:true}

